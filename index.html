<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourChoice - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        /* Dark Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* Title */
        .title {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Center Container */
        .center-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease-out 0.3s forwards;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Question Text */
        .question-text {
            font-size: 1.8rem;
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Buttons Container */
        .buttons-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Choice Button */
        .choice-btn {
            flex: 1;
            min-width: 250px;
            max-width: 300px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: white;
            text-decoration: none;
        }

        .choice-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* Icon */
        .icon {
            width: 50px;
            height: 50px;
            fill: white;
            transition: transform 0.3s ease;
        }

        .choice-btn:hover .icon {
            transform: translateY(-5px);
        }

        /* Button Text */
        .btn-text {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
                top: 40px;
            }

            .glass-card {
                padding: 35px 25px;
            }

            .question-text {
                font-size: 1.4rem;
                margin-bottom: 30px;
            }

            .buttons-container {
                flex-direction: column;
                align-items: center;
            }

            .choice-btn {
                width: 100%;
                max-width: 280px;
                padding: 30px 25px;
            }

            .btn-text {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2rem;
                top: 30px;
            }

            .glass-card {
                padding: 25px 20px;
            }

            .question-text {
                font-size: 1.2rem;
            }

            .choice-btn {
                padding: 25px 20px;
            }

            .icon {
                width: 40px;
                height: 40px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Video -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="background2.mp4" type="video/mp4">
        <!-- Fallback background image if video fails -->
        <img src="https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=1920" alt="City background">
    </video>

    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <!-- Title -->
    <h1 class="title">YourChoice</h1>

    <!-- Center Section -->
    <div class="center-container">
        <div class="glass-card">
            <p class="question-text">How would you like to proceed?</p>
            
            <div class="buttons-container">
                <!-- Customers Button -->
                <button class="choice-btn" onclick="selectOption('customers')">
                    <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span class="btn-text">Customers</span>
                </button>

                <!-- Entrepreneurs Button -->
                <button class="choice-btn" onclick="selectOption('entrepreneurs')">
                    <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 16v-1H3.01L3 19c0 1.11.89 2 2 2h14c1.11 0 2-.89 2-2v-4h-7v1h-4zm10-9h-4V4l-2-2h-4L8 4v3H4c-1.1 0-2 .9-2 2v3h20V9c0-1.1-.9-2-2-2zm-6 0h-4V4h4v3z"/>
                    </svg>
                    <span class="btn-text">Entrepreneurs</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Handle button clicks
        function selectOption(option) {
            // Add click animation
            const btn = event.currentTarget;
            btn.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                btn.style.transform = '';
                
                // Handle the selection
                if (option === 'customers') {
                    console.log('Customer portal selected');
                    // window.location.href = '/customers';
                    alert('Welcome, Customer! (Demo)');
                } else {
                    console.log('Entrepreneur portal selected');
                    // window.location.href = '/entrepreneurs';
                    alert('Welcome, Entrepreneur! (Demo)');
                }
            }, 150);
        }

        // Add smooth entrance for elements
        document.addEventListener('DOMContentLoaded', () => {
            // Ensure video plays on mobile
            const video = document.querySelector('.video-background');
            video.play().catch(error => {
                console.log('Autoplay prevented:', error);
            });
        });

        // Handle resize for responsive adjustments
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                // Any resize-specific adjustments can go here
            }, 250);
        });
    </script>
</body>
</html>
